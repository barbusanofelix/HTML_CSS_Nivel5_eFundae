<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FlexBox</title>
</head>
<body>
    <section class="flex-lab">
    <h2 class="flex-lab__title">Tablero de Control Flexbox</h2>
    
    <div class="flex-lab__scene" id="flex-scene">
        <div class="flex-lab__item flex-lab__item--1">1</div>
        <div class="flex-lab__item flex-lab__item--2">2</div>
        <div class="flex-lab__item flex-lab__item--3">3</div>
    </div>

    <div class="flex-lab__controls">
        <p><strong>Eje Principal:</strong> <code id="main-axis-info">justify-content: center</code></p>
        <p><strong>Alineación:</strong> <code id="cross-axis-info">align-items: center</code></p>
    </div>
</section>
</body>
</html>
